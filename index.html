<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Merci pour le devoir</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 32px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.4);
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #fbbf24;
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #e5e7eb;
            font-weight: 400;
        }
        p {
            margin: 0.4rem 0;
            line-height: 1.6;
        }
        .name {
            margin-top: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #38bdf8;
        }
        .accent {
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Merci infiniment&nbsp;!</h1>
        <h2>Pour ce devoir et tout ce qu’il m’a appris</h2>

        <p>Ce projet m’a permis de mieux comprendre le déploiement,</p>
        <p>la configuration d’un serveur et la logique DevOps.</p>
        <p class="accent">C’était exigeant… mais vraiment formateur.</p>

        <p class="name">Valentin</p>
    </div>
</body>
</html>
